<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #15202b;
      color: #e7e9ea;
    }
    .header { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
    .header h1 { font-size: 16px; font-weight: 700; }
    .header svg { fill: #1d9bf0; }
    .section { margin-bottom: 14px; }
    .section-title {
      font-size: 12px; color: #1d9bf0; font-weight: 600;
      margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    label { font-size: 12px; color: #8b98a5; display: block; margin-bottom: 4px; }
    input, select {
      width: 100%; background: #2d3741; color: #e7e9ea;
      border: 1px solid #38444d; border-radius: 8px;
      padding: 7px 10px; font-size: 13px; margin-bottom: 8px;
    }
    input::placeholder { color: #6e767d; }
    input:focus, select:focus { outline: none; border-color: #1d9bf0; }
    .presets { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
    .preset-btn {
      background: #2d3741; color: #8b98a5; border: 1px solid #38444d;
      border-radius: 12px; padding: 3px 8px; font-size: 11px; cursor: pointer;
    }
    .preset-btn:hover { background: #3a4750; color: #e7e9ea; }
    .saved {
      color: #00ba7c; font-size: 12px; margin-top: 4px;
      opacity: 0; transition: opacity 0.3s;
    }
    .saved.show { opacity: 1; }
    .test-btn {
      width: 100%; background: #1d9bf0; color: #fff; border: none;
      border-radius: 8px; padding: 7px; font-size: 13px;
      font-weight: 600; cursor: pointer; margin-top: 2px;
    }
    .test-btn:hover { background: #1a8cd8; }
    .test-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .test-result {
      font-size: 11px; margin-top: 6px; padding: 6px 8px;
      border-radius: 6px; display: none; word-break: break-all;
    }
    .test-result.success { display: block; background: rgba(0,186,124,0.15); color: #00ba7c; }
    .test-result.error { display: block; background: rgba(244,33,46,0.15); color: #f4212e; }
    .footer {
      margin-top: 12px; padding-top: 10px; border-top: 1px solid #38444d;
      font-size: 11px; color: #71767b; text-align: center;
    }
    .footer a { color: #1d9bf0; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
    <h1>XCard</h1>
  </div>

  <div class="section">
    <div class="section-title">AI Provider (OpenAI-compatible)</div>
    <label>Quick presets</label>
    <div class="presets">
      <button class="preset-btn" data-base="https://api.openai.com/v1" data-model="gpt-4o-mini">OpenAI</button>
      <button class="preset-btn" data-base="https://api.x.ai/v1" data-model="grok-3-mini-fast">xAI Grok</button>
      <button class="preset-btn" data-base="https://api.groq.com/openai/v1" data-model="llama-3.3-70b-versatile">Groq</button>
      <button class="preset-btn" data-base="https://api.deepseek.com/v1" data-model="deepseek-chat">DeepSeek</button>
      <button class="preset-btn" data-base="https://api.anthropic.com/v1" data-model="claude-sonnet-4-6">Anthropic</button>
    </div>
    <label for="baseUrl">API Base URL</label>
    <input id="baseUrl" type="text" placeholder="https://api.openai.com/v1">
    <label for="apiKey">API Key</label>
    <input id="apiKey" type="password" placeholder="sk-...">
    <label for="model">Model</label>
    <input id="model" type="text" placeholder="gpt-4o-mini">
    <button class="test-btn" id="testBtn">Test Connection</button>
    <div class="test-result" id="testResult"></div>
  </div>

  <div class="section">
    <div class="section-title">Card Language</div>
    <label for="lang">Default TL;DR Language</label>
    <select id="lang">
      <option value="zh">中文</option>
      <option value="en">English</option>
      <option value="ja">日本語</option>
      <option value="ko">한국어</option>
      <option value="es">Español</option>
      <option value="fr">Français</option>
      <option value="de">Deutsch</option>
    </select>
  </div>

  <div class="saved" id="saved">Saved!</div>

  <div class="footer">
    <a href="https://github.com" target="_blank">GitHub</a> &middot; v1.0.0
  </div>

  <script src="index.js"></script>
</body>
</html>
