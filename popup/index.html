<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 260px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #15202b;
      color: #e7e9ea;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 700;
    }
    .header svg { fill: #1d9bf0; }
    label {
      font-size: 13px;
      color: #8b98a5;
      display: block;
      margin-bottom: 6px;
    }
    select {
      width: 100%;
      background: #2d3741;
      color: #e7e9ea;
      border: 1px solid #38444d;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 14px;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
    }
    .saved {
      color: #00ba7c;
      font-size: 12px;
      margin-top: 8px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .saved.show { opacity: 1; }
    .footer {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #38444d;
      font-size: 11px;
      color: #71767b;
      text-align: center;
    }
    .footer a { color: #1d9bf0; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
    <h1>XCard</h1>
  </div>

  <label for="lang">Default TL;DR Language</label>
  <select id="lang">
    <option value="zh">中文</option>
    <option value="en">English</option>
    <option value="ja">日本語</option>
    <option value="ko">한국어</option>
    <option value="es">Español</option>
    <option value="fr">Français</option>
    <option value="de">Deutsch</option>
  </select>
  <div class="saved" id="saved">Saved!</div>

  <div class="footer">
    <a href="https://github.com" target="_blank">GitHub</a> &middot; v1.0.0
  </div>

  <script src="index.js"></script>
</body>
</html>
