<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #000;
      color: #e7e9ea;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 18px 20px 14px;
      border-bottom: 1px solid #2f3336;
    }
    .header svg { fill: #e7e9ea; }
    .header h1 { font-size: 17px; font-weight: 800; letter-spacing: -0.2px; }

    /* Sections */
    .section {
      padding: 14px 20px;
      border-bottom: 1px solid #2f3336;
    }
    .section:last-of-type { border-bottom: none; }

    .section-label {
      font-size: 13px;
      font-weight: 700;
      color: #e7e9ea;
      margin-bottom: 12px;
    }

    /* Presets */
    .presets {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
    }
    .preset-btn {
      flex: 1;
      background: #16181c;
      color: #71767b;
      border: 1px solid #2f3336;
      border-radius: 20px;
      padding: 6px 0;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }
    .preset-btn:hover {
      background: #1d1f23;
      color: #e7e9ea;
      border-color: #536471;
    }
    .preset-btn.active {
      background: #1d9bf0;
      color: #fff;
      border-color: #1d9bf0;
    }

    /* Form fields */
    .field { margin-bottom: 10px; }
    .field:last-child { margin-bottom: 0; }
    .field-label {
      font-size: 11px;
      color: #71767b;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .field input, .field select {
      width: 100%;
      background: #16181c;
      color: #e7e9ea;
      border: 1px solid #2f3336;
      border-radius: 4px;
      padding: 8px 10px;
      font-size: 13px;
      transition: border-color 0.15s;
    }
    .field input::placeholder { color: #536471; }
    .field input:focus, .field select:focus {
      outline: none;
      border-color: #1d9bf0;
    }
    .field select {
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%2371767b' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 10px center;
      padding-right: 28px;
    }

    /* Test button */
    .test-btn {
      width: 100%;
      background: transparent;
      color: #1d9bf0;
      border: 1px solid #1d9bf0;
      border-radius: 20px;
      padding: 7px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 12px;
    }
    .test-btn:hover { background: rgba(29, 155, 240, 0.1); }
    .test-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Test result */
    .test-result {
      font-size: 12px;
      margin-top: 8px;
      padding: 8px 10px;
      border-radius: 4px;
      display: none;
      word-break: break-word;
      line-height: 1.4;
    }
    .test-result.success {
      display: block;
      background: rgba(0, 186, 124, 0.1);
      color: #00ba7c;
      border: 1px solid rgba(0, 186, 124, 0.2);
    }
    .test-result.error {
      display: block;
      background: rgba(244, 33, 46, 0.1);
      color: #f4212e;
      border: 1px solid rgba(244, 33, 46, 0.2);
    }

    /* Saved toast */
    .saved {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: #1d9bf0;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 20px;
      opacity: 0;
      transition: all 0.25s;
      pointer-events: none;
    }
    .saved.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Footer */
    .footer {
      padding: 10px 20px 14px;
      font-size: 11px;
      color: #536471;
      text-align: center;
    }
    .footer a { color: #1d9bf0; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <svg viewBox="0 0 24 24" width="18" height="18"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
    <h1>XCard</h1>
  </div>

  <div class="section">
    <div class="section-label">AI Provider</div>
    <div class="presets">
      <button class="preset-btn" data-base="https://api.openai.com/v1" data-model="gpt-4o-mini">OpenAI</button>
      <button class="preset-btn" data-base="https://openrouter.ai/api/v1" data-model="openai/gpt-4o-mini">OpenRouter</button>
      <button class="preset-btn" data-base="https://api.anthropic.com/v1" data-model="claude-sonnet-4-6">Anthropic</button>
      <button class="preset-btn" data-base="https://integrate.api.nvidia.com/v1" data-model="z-ai/glm4.7">NVIDIA</button>
    </div>
    <div class="field">
      <div class="field-label">Base URL</div>
      <input id="baseUrl" type="text" placeholder="https://api.openai.com/v1">
    </div>
    <div class="field">
      <div class="field-label">API Key</div>
      <input id="apiKey" type="password" placeholder="sk-...">
    </div>
    <div class="field">
      <div class="field-label">Model</div>
      <input id="model" type="text" placeholder="gpt-4o-mini">
    </div>
    <button class="test-btn" id="testBtn">Test Connection</button>
    <div class="test-result" id="testResult"></div>
  </div>

  <div class="section">
    <div class="section-label">Card Language</div>
    <div class="field">
      <select id="lang">
        <option value="en">English</option>
        <option value="zh">中文</option>
        <option value="ja">日本語</option>
        <option value="ko">한국어</option>
        <option value="es">Español</option>
        <option value="fr">Français</option>
        <option value="de">Deutsch</option>
      </select>
    </div>
  </div>

  <div class="footer">
    <a href="https://github.com/kohoj/xcard" target="_blank">GitHub</a> &middot; v1.0.0
  </div>

  <div class="saved" id="saved">Saved</div>

  <script src="index.js"></script>
</body>
</html>
